# FlowTTA default configuration
fm:
  name: "chronos2"
  model_id: "amazon/chronos-t5-small"
  device: "cuda"
  dtype: "float32"

data:
  dataset: "etth1"
  context_length: 512
  prediction_length: 96
  shift_types: ["mean", "variance", "trend"]
  shift_magnitudes: [1.0, 2.0, 3.0]

adapter:
  type: "affine"  # affine, mlp, flow
  mlp_hidden_dim: 256
  flow_cond_dim: 16
  flow_hidden_dim: 256
  flow_steps: 3

adaptation:
  steps: 10
  lr: 0.001
  loss_weights:
    temporal: 1.0
    spectral: 0.5
    reconstruction: 0.5

evaluation:
  go_threshold: 3.0      # >=3% improvement = GO
  weak_go_threshold: 1.0  # 1-3% = WEAK GO
